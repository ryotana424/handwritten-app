<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手書き算数クイズ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --primary: #4f8ef7;
      --primary-dark: #2d6fd6;
      --bg: #f0f4ff;
      --card: #ffffff;
      --radius: 12px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--primary-dark);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    #app {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ブラウザ非対応バナー */
    #unsupported-banner {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: var(--radius);
      padding: 16px;
      color: #856404;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ステータスバー */
    #status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #64748b;
      padding: 0 4px;
    }

    /* 問題リスト */
    #problems-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .problem-row {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      border: 2px solid transparent;
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .problem-row.active {
      border-color: var(--primary);
    }

    .problem-row.correct {
      border-color: #22c55e;
      background: #f0fdf4;
    }

    .problem-row.wrong {
      border-color: #ef4444;
      background: #fff5f5;
    }

    .problem-num {
      font-size: 0.8rem;
      color: #94a3b8;
      width: 24px;
      flex-shrink: 0;
      text-align: center;
    }

    .problem-expr {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1e293b;
      flex: 1;
    }

    .problem-badge {
      font-size: 1.1rem;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .problem-result {
      font-size: 0.85rem;
      color: #64748b;
      flex-shrink: 0;
    }

    .problem-result.correct { color: #15803d; font-weight: 600 }
    .problem-result.wrong   { color: #b91c1c; font-weight: 600 }

    /* 手書きエリア */
    #canvas-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #canvas-label {
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 10px;
      text-align: center;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 320px;
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      cursor: crosshair;
      touch-action: none;
      background: #fafcff;
    }

    #fallback-input {
      display: none;
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      font-size: 1.6rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      text-align: center;
    }

    /* ボタン */
    .btn-row {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97) }
    button:disabled { opacity: 0.4; cursor: default }

    #check-btn {
      background: var(--primary);
      color: #fff;
    }
    #check-btn:hover:not(:disabled) { background: var(--primary-dark) }

    #clear-btn {
      background: #e2e8f0;
      color: #475569;
      flex: 0 0 auto;
      padding: 14px 24px;
    }
    #clear-btn:hover { background: #cbd5e1 }

    #next-set-btn {
      display: none;
      background: #1e293b;
      color: #fff;
      font-size: 1.05rem;
    }
    #next-set-btn:hover { background: #334155 }

    /* 最終スコア */
    #final-screen {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #final-screen h2 { font-size: 1.8rem; color: var(--primary-dark); margin-bottom: 16px }
    #final-screen p  { font-size: 1.2rem; color: #334155; margin-bottom: 24px }
    #final-score-num { font-size: 2.6rem; font-weight: 700; color: var(--primary) }

    #restart-btn {
      background: var(--primary);
      color: #fff;
      flex: none;
      padding: 14px 40px;
    }
    #restart-btn:hover { background: var(--primary-dark) }
  </style>
</head>
<body>
  <h1>手書き算数クイズ</h1>

  <div id="app">
    <div id="unsupported-banner">
      このページは <strong>Chrome / Edge（最新版）</strong> が必要です。<br>
      現在のブラウザでは Handwriting Recognition API に対応していないため、
      代わりにキーボード入力で回答できます。
    </div>

    <div id="status-bar">
      <span>スコア: <strong id="score">0</strong> / <span id="total-q">10</span></span>
      <span>セット <strong id="set-num">1</strong> / <span id="total-sets">2</span></span>
    </div>

    <!-- 問題一覧 -->
    <div id="problems-list"></div>

    <!-- 手書きエリア -->
    <div id="canvas-section">
      <div id="canvas-label">↑ 問題を選んで、ここに答えを手書きしてください</div>
      <canvas id="canvas"></canvas>
      <input id="fallback-input" type="number" placeholder="答えを入力">
    </div>

    <div class="btn-row">
      <button id="check-btn" disabled>確認する</button>
      <button id="clear-btn">消す</button>
    </div>

    <button id="next-set-btn">次のセットへ →</button>

    <!-- 最終スコア -->
    <div id="final-screen">
      <h2>クイズ終了！</h2>
      <p>あなたのスコア：<br><span id="final-score-num">0</span> / <span id="final-total">10</span> 問正解</p>
      <button id="restart-btn">もう一度</button>
    </div>
  </div>

  <script>
    'use strict'

    // ── 設定 ──────────────────────────────────────────────────────
    const PROBLEMS_PER_SET = 5
    const TOTAL_SETS = 2                        // 合計 10 問
    const TOTAL = PROBLEMS_PER_SET * TOTAL_SETS

    // ── 状態 ──────────────────────────────────────────────────────
    let recognizer = null
    let drawing = null
    let activeStroke = null
    let startTime = 0
    let latestText = ''
    let useFallback = false

    // 現在のセットの問題データ: [{ display, answer, state: 'pending'|'correct'|'wrong', userAnswer }]
    let problems = []
    let activeIdx = -1    // 現在選択中の問題インデックス
    let score = 0
    let setIndex = 0      // 0-based

    // ── DOM ───────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const problemsList = document.getElementById('problems-list')
    const canvasLabel = document.getElementById('canvas-label')
    const checkBtn = document.getElementById('check-btn')
    const clearBtn = document.getElementById('clear-btn')
    const nextSetBtn = document.getElementById('next-set-btn')
    const scoreEl = document.getElementById('score')
    const setNumEl = document.getElementById('set-num')
    const totalSetsEl = document.getElementById('total-sets')
    const totalQEl = document.getElementById('total-q')
    const finalScreen = document.getElementById('final-screen')
    const finalScoreNum = document.getElementById('final-score-num')
    const finalTotal = document.getElementById('final-total')
    const restartBtn = document.getElementById('restart-btn')
    const fallbackInput = document.getElementById('fallback-input')
    const unsupportedBanner = document.getElementById('unsupported-banner')

    // ── Canvas サイズ ─────────────────────────────────────────────
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect()
      const dpr = window.devicePixelRatio || 1
      canvas.width = rect.width * dpr
      canvas.height = rect.height * dpr
      ctx.scale(dpr, dpr)
      applyCtxStyle()
    }

    function applyCtxStyle() {
      ctx.lineWidth = 3.5
      ctx.lineCap = 'round'
      ctx.lineJoin = 'round'
      ctx.strokeStyle = '#1e293b'
    }

    // ── 問題生成 ──────────────────────────────────────────────────
    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min
    }

    function generateProblem() {
      const ops = ['+', '-', '×', '÷']
      const op = ops[Math.floor(Math.random() * ops.length)]
      let a, b, answer

      switch (op) {
        case '+': a = rand(1, 50); b = rand(1, 50); answer = a + b; break
        case '-': a = rand(10, 99); b = rand(1, a); answer = a - b; break
        case '×': a = rand(2, 12); b = rand(2, 12); answer = a * b; break
        case '÷': b = rand(2, 12); answer = rand(2, 12); a = b * answer; break
      }

      return { display: `${a}  ${op}  ${b}  ＝  ？`, answer, state: 'pending', userAnswer: null }
    }

    // ── API 初期化 ────────────────────────────────────────────────
    async function initRecognizer() {
      if (!('createHandwritingRecognizer' in navigator)) {
        enableFallback(); return
      }
      try {
        recognizer = await navigator.createHandwritingRecognizer({ languages: ['en'] })
      } catch (e) {
        console.warn('Handwriting recognizer init failed:', e)
        enableFallback()
      }
    }

    function enableFallback() {
      useFallback = true
      unsupportedBanner.style.display = 'block'
      canvas.style.display = 'none'
      fallbackInput.style.display = 'block'
    }

    function resetDrawing() {
      if (!recognizer) return
      drawing = recognizer.startDrawing({ recognitionType: 'number', alternatives: 3 })
      latestText = ''
    }

    // ── Canvas イベント ───────────────────────────────────────────
    function getPos(e) {
      const rect = canvas.getBoundingClientRect()
      return { x: e.clientX - rect.left, y: e.clientY - rect.top }
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault()
      if (activeIdx < 0 || problems[activeIdx].state !== 'pending') return
      const { x, y } = getPos(e)
      activeStroke = new HandwritingStroke()
      activeStroke.addPoint({ x, y, t: Date.now() - startTime })
      ctx.beginPath()
      ctx.moveTo(x, y)
    })

    canvas.addEventListener('pointermove', (e) => {
      e.preventDefault()
      if (!activeStroke) return
      const { x, y } = getPos(e)
      activeStroke.addPoint({ x, y, t: Date.now() - startTime })
      ctx.lineTo(x, y)
      ctx.stroke()
    })

    canvas.addEventListener('pointerup', (e) => {
      e.preventDefault()
      if (!activeStroke) return
      drawing.addStroke(activeStroke)
      activeStroke = null
      fetchPrediction()
    })

    canvas.addEventListener('pointerleave', () => {
      if (!activeStroke) return
      drawing.addStroke(activeStroke)
      activeStroke = null
      fetchPrediction()
    })

    async function fetchPrediction() {
      if (!drawing) return
      try {
        const preds = await drawing.getPrediction()
        if (preds.length > 0) latestText = preds[0].text
      } catch (e) {
        console.warn('getPrediction error:', e)
      }
    }

    function clearCanvas() {
      const dpr = window.devicePixelRatio || 1
      ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr)
      if (!useFallback) resetDrawing()
      latestText = ''
    }

    // ── 問題選択 ──────────────────────────────────────────────────
    function selectProblem(idx) {
      if (problems[idx].state !== 'pending') return
      activeIdx = idx
      clearCanvas()
      if (useFallback) fallbackInput.value = ''
      startTime = Date.now()
      checkBtn.disabled = false
      canvasLabel.textContent = `問題 ${setIndex * PROBLEMS_PER_SET + idx + 1} の答えを手書きしてください`
      renderProblems()
    }

    // ── 答え確認 ──────────────────────────────────────────────────
    function checkAnswer() {
      if (activeIdx < 0 || problems[activeIdx].state !== 'pending') return

      let raw = useFallback ? fallbackInput.value : latestText
      raw = raw.trim().replace(',', '.')

      if (raw === '') {
        canvasLabel.textContent = '答えをまだ書いていません。'
        return
      }

      const parsed = parseFloat(raw)
      if (isNaN(parsed)) {
        canvasLabel.textContent = `「${raw}」は読み取れませんでした。もう一度書いてみてください。`
        return
      }

      const prob = problems[activeIdx]
      if (Math.abs(parsed - prob.answer) < 0.01) {
        prob.state = 'correct'
        score++
        scoreEl.textContent = score
      } else {
        prob.state = 'wrong'
      }
      prob.userAnswer = parsed

      checkBtn.disabled = true
      clearCanvas()
      renderProblems()

      // 全問回答済みならセット完了
      const allDone = problems.every(p => p.state !== 'pending')
      if (allDone) {
        activeIdx = -1
        canvasLabel.textContent = '全問回答しました！'
        nextSetBtn.style.display = 'block'
        checkBtn.disabled = true
      } else {
        // 次の未回答問題を自動選択
        const next = problems.findIndex((p, i) => i !== activeIdx && p.state === 'pending')
        if (next >= 0) selectProblem(next)
      }
    }

    // ── 問題カード描画 ────────────────────────────────────────────
    function renderProblems() {
      problemsList.innerHTML = ''
      problems.forEach((p, i) => {
        const row = document.createElement('div')
        row.className = 'problem-row' +
          (i === activeIdx ? ' active' : '') +
          (p.state === 'correct' ? ' correct' : '') +
          (p.state === 'wrong' ? ' wrong' : '')

        const num = document.createElement('div')
        num.className = 'problem-num'
        num.textContent = setIndex * PROBLEMS_PER_SET + i + 1

        const expr = document.createElement('div')
        expr.className = 'problem-expr'
        expr.textContent = p.display

        const badge = document.createElement('div')
        badge.className = 'problem-badge'
        badge.textContent = p.state === 'correct' ? '✅' : p.state === 'wrong' ? '❌' : ''

        const result = document.createElement('div')
        result.className = 'problem-result' + (p.state !== 'pending' ? ` ${p.state}` : '')
        if (p.state === 'correct') {
          result.textContent = `${p.userAnswer}`
        } else if (p.state === 'wrong') {
          result.textContent = `答え: ${p.answer}`
        }

        row.append(num, expr, badge, result)

        if (p.state === 'pending') {
          row.addEventListener('click', () => selectProblem(i))
        }

        problemsList.appendChild(row)
      })
    }

    // ── セットロード ──────────────────────────────────────────────
    function loadSet() {
      problems = Array.from({ length: PROBLEMS_PER_SET }, generateProblem)
      activeIdx = -1
      nextSetBtn.style.display = 'none'
      checkBtn.disabled = true
      canvasLabel.textContent = '↑ 問題を選んで、ここに答えを手書きしてください'
      clearCanvas()
      if (useFallback) fallbackInput.value = ''

      setNumEl.textContent = setIndex + 1
      scoreEl.textContent = score
      renderProblems()

      // 最初の問題を自動選択
      selectProblem(0)
    }

    // ── 次のセット or 終了 ────────────────────────────────────────
    function goNextSet() {
      setIndex++
      if (setIndex >= TOTAL_SETS) {
        showFinalScreen()
      } else {
        loadSet()
      }
    }

    // ── 最終スコア ────────────────────────────────────────────────
    function showFinalScreen() {
      document.getElementById('canvas-section').style.display = 'none'
      document.querySelector('.btn-row').style.display = 'none'
      problemsList.style.display = 'none'
      nextSetBtn.style.display = 'none'
      finalScoreNum.textContent = score
      finalTotal.textContent = TOTAL
      finalScreen.style.display = 'block'
    }

    function restart() {
      score = 0
      setIndex = 0
      scoreEl.textContent = '0'
      document.getElementById('canvas-section').style.display = 'block'
      document.querySelector('.btn-row').style.display = 'flex'
      problemsList.style.display = 'flex'
      finalScreen.style.display = 'none'
      loadSet()
    }

    // ── ボタンイベント ────────────────────────────────────────────
    checkBtn.addEventListener('click', checkAnswer)
    clearBtn.addEventListener('click', () => {
      clearCanvas()
      if (useFallback) fallbackInput.value = ''
    })
    nextSetBtn.addEventListener('click', goNextSet)
    restartBtn.addEventListener('click', restart)

    fallbackInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkAnswer()
    })

    // ── 初期化 ────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      totalSetsEl.textContent = TOTAL_SETS
      totalQEl.textContent = TOTAL
      finalTotal.textContent = TOTAL
      resizeCanvas()
      await initRecognizer()
      if (!useFallback) resetDrawing()
      loadSet()
    })

    window.addEventListener('resize', resizeCanvas)
  </script>
</body>
</html>
