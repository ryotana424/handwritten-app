<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手書き算数クイズ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --primary: #4f8ef7;
      --primary-dark: #2d6fd6;
      --correct: #22c55e;
      --wrong: #ef4444;
      --neutral: #64748b;
      --bg: #f0f4ff;
      --card: #ffffff;
      --radius: 12px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--primary-dark);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    #app {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ブラウザ非対応バナー */
    #unsupported-banner {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: var(--radius);
      padding: 16px;
      color: #856404;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ステータスバー */
    #status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--neutral);
      padding: 0 4px;
    }

    /* 問題カード */
    #problem-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #problem {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #1e293b;
    }

    /* 手書きエリア */
    #canvas-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #canvas-label {
      font-size: 0.8rem;
      color: var(--neutral);
      margin-bottom: 8px;
      text-align: center;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 180px;
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      cursor: crosshair;
      touch-action: none;
      background: #fafcff;
    }

    /* ボタン */
    .btn-row {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97) }
    button:disabled { opacity: 0.45; cursor: default }

    #check-btn {
      background: var(--primary);
      color: #fff;
    }

    #check-btn:hover:not(:disabled) { background: var(--primary-dark) }

    #clear-btn {
      background: #e2e8f0;
      color: #475569;
    }

    #clear-btn:hover { background: #cbd5e1 }

    /* フィードバック */
    #feedback {
      border-radius: var(--radius);
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    #feedback.correct { background: #dcfce7; color: #15803d }
    #feedback.wrong   { background: #fee2e2; color: #b91c1c }
    #feedback.neutral { background: #f1f5f9; color: var(--neutral) }

    /* 次の問題ボタン */
    #next-btn {
      display: none;
      background: #1e293b;
      color: #fff;
      padding: 16px;
      border-radius: var(--radius);
      font-size: 1.05rem;
    }

    #next-btn:hover { background: #334155 }

    /* 最終スコア */
    #final-screen {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #final-screen h2 { font-size: 1.8rem; color: var(--primary-dark); margin-bottom: 16px }
    #final-screen p  { font-size: 1.2rem; color: #334155; margin-bottom: 24px }

    #final-score-num { font-size: 2.4rem; font-weight: 700; color: var(--primary) }

    #restart-btn {
      background: var(--primary);
      color: #fff;
      padding: 14px 40px;
      font-size: 1rem;
      flex: none;
    }
    #restart-btn:hover { background: var(--primary-dark) }
  </style>
</head>
<body>
  <h1>手書き算数クイズ</h1>

  <div id="app">
    <!-- ブラウザ非対応 -->
    <div id="unsupported-banner">
      このページは <strong>Chrome / Edge（最新版）</strong> が必要です。<br>
      現在のブラウザでは Handwriting Recognition API に対応していないため、
      代わりにキーボード入力で回答できます。
    </div>

    <!-- ステータス -->
    <div id="status-bar">
      <span>スコア: <strong id="score">0</strong> / 10</span>
      <span>問題 <strong id="q-num">1</strong> / 10</span>
    </div>

    <!-- 問題 -->
    <div id="problem-card">
      <div id="problem">読み込み中...</div>
    </div>

    <!-- 手書きキャンバス -->
    <div id="canvas-card">
      <div id="canvas-label">答えをここに手書きしてください</div>
      <canvas id="canvas"></canvas>
      <!-- フォールバック用テキスト入力（非対応ブラウザ） -->
      <input id="fallback-input" type="number" placeholder="答えを入力"
        style="display:none; width:100%; margin-top:10px; padding:12px; font-size:1.4rem;
               border:2px solid #cbd5e1; border-radius:8px; text-align:center;">
    </div>

    <!-- ボタン -->
    <div class="btn-row">
      <button id="check-btn">確認する</button>
      <button id="clear-btn">消す</button>
    </div>

    <!-- フィードバック -->
    <div id="feedback"></div>

    <!-- 次の問題 -->
    <button id="next-btn">次の問題 →</button>

    <!-- 最終スコア -->
    <div id="final-screen">
      <h2>クイズ終了！</h2>
      <p>あなたのスコア：<br><span id="final-score-num">0</span> / 10 問正解</p>
      <button id="restart-btn">もう一度</button>
    </div>
  </div>

  <script>
    'use strict'

    // ── 定数 ──────────────────────────────────────────────────────
    const TOTAL = 10

    // ── 状態 ──────────────────────────────────────────────────────
    let recognizer = null
    let drawing = null
    let activeStroke = null
    let startTime = 0
    let latestText = ''
    let currentAnswer = 0
    let score = 0
    let questionIndex = 0
    let isAnswered = false
    let useFallback = false

    // ── DOM ───────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const problemEl = document.getElementById('problem')
    const feedbackEl = document.getElementById('feedback')
    const nextBtn = document.getElementById('next-btn')
    const checkBtn = document.getElementById('check-btn')
    const clearBtn = document.getElementById('clear-btn')
    const scoreEl = document.getElementById('score')
    const qNumEl = document.getElementById('q-num')
    const finalScreen = document.getElementById('final-screen')
    const finalScoreNum = document.getElementById('final-score-num')
    const restartBtn = document.getElementById('restart-btn')
    const fallbackInput = document.getElementById('fallback-input')
    const unsupportedBanner = document.getElementById('unsupported-banner')

    // ── Canvas サイズ調整 ──────────────────────────────────────────
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect()
      const dpr = window.devicePixelRatio || 1
      canvas.width = rect.width * dpr
      canvas.height = rect.height * dpr
      ctx.scale(dpr, dpr)
      setupCtx()
    }

    function setupCtx() {
      ctx.lineWidth = 3
      ctx.lineCap = 'round'
      ctx.lineJoin = 'round'
      ctx.strokeStyle = '#1e293b'
    }

    // ── 問題生成 ──────────────────────────────────────────────────
    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min
    }

    function generateProblem() {
      const ops = ['+', '-', '×', '÷']
      const op = ops[Math.floor(Math.random() * ops.length)]
      let a, b, answer

      switch (op) {
        case '+':
          a = rand(1, 50); b = rand(1, 50)
          answer = a + b
          break
        case '-':
          a = rand(10, 99); b = rand(1, a)
          answer = a - b
          break
        case '×':
          a = rand(2, 12); b = rand(2, 12)
          answer = a * b
          break
        case '÷':
          b = rand(2, 12); answer = rand(2, 12)
          a = b * answer
          break
      }

      return { display: `${a}  ${op}  ${b}  ＝  ？`, answer }
    }

    // ── 認識 API 初期化 ───────────────────────────────────────────
    async function initRecognizer() {
      if (!('createHandwritingRecognizer' in navigator)) {
        useFallback = true
        unsupportedBanner.style.display = 'block'
        canvas.style.display = 'none'
        fallbackInput.style.display = 'block'
        return
      }

      try {
        recognizer = await navigator.createHandwritingRecognizer({ languages: ['en'] })
      } catch (e) {
        console.warn('Handwriting recognizer init failed:', e)
        useFallback = true
        unsupportedBanner.style.display = 'block'
        canvas.style.display = 'none'
        fallbackInput.style.display = 'block'
      }
    }

    function resetDrawing() {
      if (!recognizer) return
      drawing = recognizer.startDrawing({
        recognitionType: 'number',
        alternatives: 3
      })
      latestText = ''
    }

    // ── Canvas 描画イベント ────────────────────────────────────────
    function getPos(e) {
      const rect = canvas.getBoundingClientRect()
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      }
    }

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault()
      if (isAnswered) return
      const { x, y } = getPos(e)
      activeStroke = new HandwritingStroke()
      activeStroke.addPoint({ x, y, t: Date.now() - startTime })
      ctx.beginPath()
      ctx.moveTo(x, y)
    })

    canvas.addEventListener('pointermove', (e) => {
      e.preventDefault()
      if (!activeStroke || isAnswered) return
      const { x, y } = getPos(e)
      activeStroke.addPoint({ x, y, t: Date.now() - startTime })
      ctx.lineTo(x, y)
      ctx.stroke()
    })

    canvas.addEventListener('pointerup', (e) => {
      e.preventDefault()
      if (!activeStroke) return
      drawing.addStroke(activeStroke)
      activeStroke = null
      getPrediction()
    })

    canvas.addEventListener('pointerleave', (e) => {
      if (!activeStroke) return
      drawing.addStroke(activeStroke)
      activeStroke = null
      getPrediction()
    })

    async function getPrediction() {
      if (!drawing) return
      try {
        const preds = await drawing.getPrediction()
        if (preds.length > 0) latestText = preds[0].text
      } catch (e) {
        console.warn('getPrediction error:', e)
      }
    }

    // ── Canvas クリア ──────────────────────────────────────────────
    function clearCanvas() {
      const dpr = window.devicePixelRatio || 1
      ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr)
      resetDrawing()
      latestText = ''
    }

    // ── 問題ロード ────────────────────────────────────────────────
    function loadProblem() {
      const { display, answer } = generateProblem()
      currentAnswer = answer
      problemEl.textContent = display
      hideFeedback()
      nextBtn.style.display = 'none'
      checkBtn.disabled = false
      isAnswered = false

      // Canvas / フォールバック リセット
      if (!useFallback) {
        clearCanvas()
        startTime = Date.now()
      } else {
        fallbackInput.value = ''
      }

      // ステータス更新
      qNumEl.textContent = questionIndex + 1
      scoreEl.textContent = score
    }

    // ── 答え確認 ──────────────────────────────────────────────────
    function checkAnswer() {
      if (isAnswered) return

      let raw = useFallback ? fallbackInput.value : latestText
      raw = raw.trim().replace(',', '.')

      if (raw === '') {
        showFeedback('答えをまだ書いていません。', 'neutral')
        return
      }

      const parsed = parseFloat(raw)

      if (isNaN(parsed)) {
        showFeedback(`「${raw}」は読み取れませんでした。もう一度書いてみてください。`, 'neutral')
        return
      }

      isAnswered = true
      checkBtn.disabled = true

      if (Math.abs(parsed - currentAnswer) < 0.01) {
        score++
        scoreEl.textContent = score
        showFeedback(`正解！ ${currentAnswer} です。`, 'correct')
      } else {
        showFeedback(`惜しい！正しい答えは ${currentAnswer} です。（あなたの答え: ${parsed}）`, 'wrong')
      }

      nextBtn.style.display = 'block'
    }

    // ── フィードバック表示 ─────────────────────────────────────────
    function showFeedback(msg, type) {
      feedbackEl.textContent = msg
      feedbackEl.className = type
      feedbackEl.style.display = 'block'
    }

    function hideFeedback() {
      feedbackEl.style.display = 'none'
      feedbackEl.className = ''
      feedbackEl.textContent = ''
    }

    // ── 最終スコア ────────────────────────────────────────────────
    function showFinalScreen() {
      document.getElementById('problem-card').style.display = 'none'
      document.getElementById('canvas-card').style.display = 'none'
      document.querySelector('.btn-row').style.display = 'none'
      hideFeedback()
      nextBtn.style.display = 'none'

      finalScoreNum.textContent = score
      finalScreen.style.display = 'block'
    }

    function restart() {
      score = 0
      questionIndex = 0
      scoreEl.textContent = '0'

      document.getElementById('problem-card').style.display = 'block'
      document.getElementById('canvas-card').style.display = 'block'
      document.querySelector('.btn-row').style.display = 'flex'
      finalScreen.style.display = 'none'

      loadProblem()
    }

    // ── ボタンイベント ────────────────────────────────────────────
    checkBtn.addEventListener('click', checkAnswer)

    clearBtn.addEventListener('click', () => {
      if (useFallback) {
        fallbackInput.value = ''
      } else {
        clearCanvas()
      }
      hideFeedback()
    })

    nextBtn.addEventListener('click', () => {
      questionIndex++
      if (questionIndex >= TOTAL) {
        showFinalScreen()
      } else {
        loadProblem()
      }
    })

    restartBtn.addEventListener('click', restart)

    // ── 初期化 ────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      resizeCanvas()
      await initRecognizer()
      if (!useFallback) resetDrawing()
      startTime = Date.now()
      loadProblem()
    })

    window.addEventListener('resize', () => {
      resizeCanvas()
    })
  </script>
</body>
</html>
