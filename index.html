<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手書き算数クイズ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --primary: #4f8ef7;
      --primary-dark: #2d6fd6;
      --bg: #f0f4ff;
      --card: #ffffff;
      --radius: 12px;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--primary-dark);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    #app {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ブラウザ非対応バナー */
    #unsupported-banner {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: var(--radius);
      padding: 16px;
      color: #856404;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ステータスバー */
    #status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #64748b;
      padding: 0 4px;
    }

    /* 問題カード */
    .problem-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border: 2px solid transparent;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: stretch;
      gap: 16px;
    }

    .problem-card.correct { border-color: #22c55e; background: #f0fdf4 }
    .problem-card.wrong   { border-color: #ef4444; background: #fff5f5 }

    /* 左列：問題番号・式・フィードバック */
    .problem-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      width: 200px;
      flex-shrink: 0;
    }

    .problem-num {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .problem-expr {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1e293b;
      line-height: 1.2;
    }

    .problem-feedback {
      font-size: 0.88rem;
      font-weight: 600;
      min-height: 1.2em;
    }

    .problem-feedback.correct { color: #15803d }
    .problem-feedback.wrong   { color: #b91c1c }

    /* 右列：手書きエリア */
    .problem-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .problem-canvas {
      display: block;
      width: 100%;
      height: 140px;
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      cursor: crosshair;
      touch-action: none;
      background: #fafcff;
    }

    .problem-card.correct .problem-canvas,
    .problem-card.wrong .problem-canvas {
      opacity: 0.35;
      pointer-events: none;
    }

    .clear-btn {
      align-self: flex-end;
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      background: #e2e8f0;
      color: #475569;
      transition: background 0.15s;
    }
    .clear-btn:hover { background: #cbd5e1 }
    .problem-card.correct .clear-btn,
    .problem-card.wrong .clear-btn { display: none }

    .problem-fallback {
      display: none;
      width: 100%;
      padding: 10px;
      font-size: 1.4rem;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      text-align: center;
    }

    /* 採点ボタンエリア */
    #grade-area {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    #grade-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }
    #grade-btn:hover { background: var(--primary-dark) }
    #grade-btn:active { transform: scale(0.98) }
    #grade-btn:disabled { opacity: 0.4; cursor: default }

    /* 次のセットボタン */
    #next-set-btn {
      display: none;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      background: #1e293b;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }
    #next-set-btn:hover { background: #334155 }
    #next-set-btn:active { transform: scale(0.98) }

    /* 最終スコア */
    #final-screen {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #final-screen h2 { font-size: 1.8rem; color: var(--primary-dark); margin-bottom: 16px }
    #final-screen p  { font-size: 1.2rem; color: #334155; margin-bottom: 24px }
    #final-score-num { font-size: 2.6rem; font-weight: 700; color: var(--primary) }

    #restart-btn {
      padding: 14px 40px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }
    #restart-btn:hover { background: var(--primary-dark) }
  </style>
</head>
<body>
  <h1>手書き算数クイズ</h1>

  <div id="app">
    <div id="unsupported-banner">
      このページは <strong>Chrome / Edge（最新版）</strong> が必要です。<br>
      現在のブラウザでは Handwriting Recognition API に対応していないため、
      代わりにキーボード入力で回答できます。
    </div>

    <div id="status-bar">
      <span>スコア: <strong id="score">0</strong> / <span id="total-q">10</span></span>
      <span>セット <strong id="set-num">1</strong> / <span id="total-sets">2</span></span>
    </div>

    <div id="problems-container"></div>

    <div id="grade-area">
      <button id="grade-btn">採点する</button>
    </div>

    <button id="next-set-btn">次のセットへ →</button>

    <div id="final-screen">
      <h2>クイズ終了！</h2>
      <p>あなたのスコア：<br><span id="final-score-num">0</span> / <span id="final-total">10</span> 問正解</p>
      <button id="restart-btn">もう一度</button>
    </div>
  </div>

  <script>
    'use strict'

    const PROBLEMS_PER_SET = 5
    const TOTAL_SETS = 2
    const TOTAL = PROBLEMS_PER_SET * TOTAL_SETS

    let recognizer = null
    let useFallback = false
    let score = 0
    let setIndex = 0
    let problems = []

    // ── DOM refs ──────────────────────────────────────────────────
    const container = document.getElementById('problems-container')
    const gradeBtn = document.getElementById('grade-btn')
    const gradeArea = document.getElementById('grade-area')
    const nextSetBtn = document.getElementById('next-set-btn')
    const scoreEl = document.getElementById('score')
    const setNumEl = document.getElementById('set-num')
    const totalSetsEl = document.getElementById('total-sets')
    const totalQEl = document.getElementById('total-q')
    const finalScreen = document.getElementById('final-screen')
    const finalScoreNum = document.getElementById('final-score-num')
    const finalTotal = document.getElementById('final-total')
    const restartBtn = document.getElementById('restart-btn')
    const unsupportedBanner = document.getElementById('unsupported-banner')

    // ── 問題生成 ──────────────────────────────────────────────────
    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min
    }

    function generateProblem() {
      const ops = ['+', '-', '×', '÷']
      const op = ops[Math.floor(Math.random() * ops.length)]
      let a, b, answer
      switch (op) {
        case '+': a = rand(1, 50); b = rand(1, 50); answer = a + b; break
        case '-': a = rand(10, 99); b = rand(1, a); answer = a - b; break
        case '×': a = rand(2, 12); b = rand(2, 12); answer = a * b; break
        case '÷': b = rand(2, 12); answer = rand(2, 12); a = b * answer; break
      }
      return { display: `${a}  ${op}  ${b}  ＝  ？`, answer }
    }

    // ── API 初期化 ────────────────────────────────────────────────
    async function initRecognizer() {
      if (!('createHandwritingRecognizer' in navigator)) {
        useFallback = true
        unsupportedBanner.style.display = 'block'
        return
      }
      try {
        recognizer = await navigator.createHandwritingRecognizer({ languages: ['en'] })
      } catch (e) {
        console.warn('Handwriting recognizer init failed:', e)
        useFallback = true
        unsupportedBanner.style.display = 'block'
      }
    }

    function newDrawing() {
      if (!recognizer) return null
      return recognizer.startDrawing({ recognitionType: 'number', alternatives: 3 })
    }

    // ── Canvas セットアップ ───────────────────────────────────────
    function setupCanvas(prob, canvasEl) {
      const dpr = window.devicePixelRatio || 1
      const rect = canvasEl.getBoundingClientRect()
      canvasEl.width = rect.width * dpr
      canvasEl.height = rect.height * dpr
      const ctx = canvasEl.getContext('2d')
      ctx.scale(dpr, dpr)
      ctx.lineWidth = 3.5
      ctx.lineCap = 'round'
      ctx.lineJoin = 'round'
      ctx.strokeStyle = '#1e293b'
      prob.ctx = ctx
    }

    function clearProblemCanvas(prob) {
      const dpr = window.devicePixelRatio || 1
      prob.ctx.clearRect(0, 0, prob.canvas.width / dpr, prob.canvas.height / dpr)
      prob.drawing = newDrawing()
      prob.latestText = ''
      prob.activeStroke = null
      prob.startTime = Date.now()
    }

    // ── Canvas イベント（問題ごと） ───────────────────────────────
    function bindCanvasEvents(prob) {
      const c = prob.canvas

      c.addEventListener('pointerdown', (e) => {
        e.preventDefault()
        if (prob.state !== 'pending') return
        const rect = c.getBoundingClientRect()
        prob.activeStroke = new HandwritingStroke()
        prob.activeStroke.addPoint({ x: e.clientX - rect.left, y: e.clientY - rect.top, t: Date.now() - prob.startTime })
        prob.ctx.beginPath()
        prob.ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top)
      })

      c.addEventListener('pointermove', (e) => {
        e.preventDefault()
        if (!prob.activeStroke) return
        const rect = c.getBoundingClientRect()
        const x = e.clientX - rect.left
        const y = e.clientY - rect.top
        prob.activeStroke.addPoint({ x, y, t: Date.now() - prob.startTime })
        prob.ctx.lineTo(x, y)
        prob.ctx.stroke()
      })

      const finishStroke = () => {
        if (!prob.activeStroke) return
        prob.drawing.addStroke(prob.activeStroke)
        prob.activeStroke = null
        // 認識結果を更新しておく（採点時に使う）
        prob.drawing.getPrediction().then(preds => {
          if (preds.length > 0) prob.latestText = preds[0].text
        }).catch(() => {})
      }

      c.addEventListener('pointerup', (e) => { e.preventDefault(); finishStroke() })
      c.addEventListener('pointerleave', finishStroke)
    }

    // ── 採点（全問まとめて） ──────────────────────────────────────
    async function gradeAll() {
      gradeBtn.disabled = true

      // 認識中のストロークが残っている場合、最新の prediction を取得してから採点
      const predPromises = problems.map(prob => {
        if (prob.state !== 'pending' || !prob.drawing) return Promise.resolve()
        return prob.drawing.getPrediction().then(preds => {
          if (preds.length > 0) prob.latestText = preds[0].text
        }).catch(() => {})
      })
      await Promise.all(predPromises)

      problems.forEach(prob => {
        if (prob.state !== 'pending') return

        const card = prob.canvas.closest('.problem-card')
        const feedbackEl = card.querySelector('.problem-feedback')
        const raw = (useFallback ? prob.fallbackInput.value : prob.latestText).trim().replace(',', '.')

        if (raw === '') {
          prob.state = 'wrong'
          feedbackEl.textContent = `❌ 答え: ${prob.answer}（未記入）`
          feedbackEl.className = 'problem-feedback wrong'
        } else {
          const parsed = parseFloat(raw)
          if (isNaN(parsed)) {
            prob.state = 'wrong'
            feedbackEl.textContent = `❌ 答え: ${prob.answer}（読取失敗）`
            feedbackEl.className = 'problem-feedback wrong'
          } else if (Math.abs(parsed - prob.answer) < 0.01) {
            prob.state = 'correct'
            score++
            feedbackEl.textContent = `✅ 正解！`
            feedbackEl.className = 'problem-feedback correct'
          } else {
            prob.state = 'wrong'
            feedbackEl.textContent = `❌ 答え: ${prob.answer}（あなた: ${parsed}）`
            feedbackEl.className = 'problem-feedback wrong'
          }
        }
        card.classList.add(prob.state)
      })

      scoreEl.textContent = score
      gradeArea.style.display = 'none'
      nextSetBtn.style.display = 'block'
    }

    // ── セットロード ──────────────────────────────────────────────
    function loadSet() {
      problems = Array.from({ length: PROBLEMS_PER_SET }, () => ({
        ...generateProblem(),
        state: 'pending',
        drawing: null,
        activeStroke: null,
        startTime: Date.now(),
        latestText: '',
        canvas: null,
        ctx: null,
        fallbackInput: null,
      }))

      container.innerHTML = ''
      gradeArea.style.display = 'flex'
      gradeBtn.disabled = false
      nextSetBtn.style.display = 'none'
      setNumEl.textContent = setIndex + 1
      scoreEl.textContent = score

      problems.forEach((prob, i) => {
        const card = document.createElement('div')
        card.className = 'problem-card'

        // 左列
        const left = document.createElement('div')
        left.className = 'problem-left'

        const num = document.createElement('div')
        num.className = 'problem-num'
        num.textContent = `問 ${setIndex * PROBLEMS_PER_SET + i + 1}`

        const expr = document.createElement('div')
        expr.className = 'problem-expr'
        expr.textContent = prob.display

        const feedback = document.createElement('div')
        feedback.className = 'problem-feedback'

        left.append(num, expr, feedback)

        // 右列
        const right = document.createElement('div')
        right.className = 'problem-right'

        const canvasEl = document.createElement('canvas')
        canvasEl.className = 'problem-canvas'
        prob.canvas = canvasEl

        const fi = document.createElement('input')
        fi.type = 'number'
        fi.placeholder = '答えを入力'
        fi.className = 'problem-fallback'
        if (useFallback) fi.style.display = 'block'
        prob.fallbackInput = fi

        const clearBtn = document.createElement('button')
        clearBtn.className = 'clear-btn'
        clearBtn.textContent = '消す'
        clearBtn.addEventListener('click', () => {
          if (useFallback) { fi.value = '' } else { clearProblemCanvas(prob) }
          feedback.textContent = ''
          feedback.className = 'problem-feedback'
        })

        right.append(canvasEl, fi, clearBtn)
        card.append(left, right)
        container.appendChild(card)

        requestAnimationFrame(() => {
          setupCanvas(prob, canvasEl)
          if (!useFallback) {
            prob.drawing = newDrawing()
            bindCanvasEvents(prob)
          }
        })
      })
    }

    // ── 次のセット or 終了 ────────────────────────────────────────
    function goNextSet() {
      setIndex++
      if (setIndex >= TOTAL_SETS) {
        showFinalScreen()
      } else {
        container.innerHTML = ''
        loadSet()
      }
    }

    function showFinalScreen() {
      container.style.display = 'none'
      gradeArea.style.display = 'none'
      nextSetBtn.style.display = 'none'
      finalScoreNum.textContent = score
      finalTotal.textContent = TOTAL
      finalScreen.style.display = 'block'
    }

    function restart() {
      score = 0
      setIndex = 0
      container.style.display = 'flex'
      container.style.flexDirection = 'column'
      container.style.gap = '12px'
      finalScreen.style.display = 'none'
      loadSet()
    }

    // ── イベント ──────────────────────────────────────────────────
    gradeBtn.addEventListener('click', gradeAll)
    nextSetBtn.addEventListener('click', goNextSet)
    restartBtn.addEventListener('click', restart)

    window.addEventListener('resize', () => {
      problems.forEach(prob => {
        if (prob.canvas && prob.state === 'pending') setupCanvas(prob, prob.canvas)
      })
    })

    // ── 初期化 ────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      totalSetsEl.textContent = TOTAL_SETS
      totalQEl.textContent = TOTAL
      finalTotal.textContent = TOTAL
      container.style.display = 'flex'
      container.style.flexDirection = 'column'
      container.style.gap = '12px'
      await initRecognizer()
      loadSet()
    })
  </script>
</body>
</html>
